name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  minimal:
    name: Minimal / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install minimal package and test runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pip install -e .
      - name: CLI help smoke test
        run: seattrellis --help
      - name: Run minimal install tests
        run: pytest tests/test_minimal_install.py

  full:
    name: Full / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install full package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all,dev]"
      - name: Run tests
        run: pytest
      - name: Build package
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python -m build
      - name: README command smoke test
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        shell: bash
        run: |
          seattrellis --help
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          seattrellis init-demo
          seattrellis validate --students examples/students.csv --layout examples/classroom.json --rules examples/rules.json
          seattrellis history-report --students examples/students.csv --layout examples/classroom.json --history-dir examples/history
          seattrellis solve --students examples/students.xlsx --layout examples/classroom.json --rules examples/rules.json --history-dir examples/history
          seattrellis export --snapshot outputs/latest.snapshot.json --format excel
          seattrellis export --snapshot outputs/latest.snapshot.json --format png
          seattrellis export --snapshot outputs/latest.snapshot.json --format html
